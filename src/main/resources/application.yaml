spring:
  application:
    name: MyAsset

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/myasset_db}
    username: ${DATASOURCE_USERNAME:root}
    password: ${DATASOURCE_PASSWORD}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  batch:
    jdbc:
      initialize-schema: always  # BATCH_JOB_* 메타 테이블 자동 생성
    job:
      enabled: false             # 기동 시 Job 자동 실행 방지

batch:
  scheduler:
    enabled: ${BATCH_SCHEDULER_ENABLED:false}  # 운영에서만 on

codef:
  client-id: ${CLIENT_ID}
  client-secret: ${CLIENT_SECRET}
  public-key: ${PUBLIC_KEY}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000    # 30분 (ms)
  refresh-token-expiry: 604800000 # 7일 (ms)

openai:
  api-key: ${OPENAI_API_KEY}
  url: https://api.openai.com/v1

aws:
  s3:
    enabled: ${AWS_S3_ENABLED:true} # local에서는 false로 변경 바람
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_S3_REGION}